<section class="blog">
  <div class="container">

<div class="col-lg-8">

<h1 class="section-title">Latest Posts</h1>

<div id="postsList"></div>

</div>



<script>

async function loadPosts(){

  const response = await fetch(
    "https://api.github.com/repos/shujon1410941-eng/trendblogs/contents/blogs"
  );

  let data = await response.json();

  data.reverse(); 

  const postsDiv = document.getElementById("postsList");

  for(const file of data){

    if(file.name.endsWith(".html")){

      const fileResponse = await fetch(file.download_url);
      const htmlText = await fileResponse.text();


      const parser = new DOMParser();
      const doc = parser.parseFromString(htmlText, "text/html");


      const pTag = doc.querySelector(".blog-single .single-blog p");

      let excerpt = "No excerpt available.";

      if(pTag){

        excerpt = pTag.textContent
          .replace(/\s+/g, " ")
          .trim()
          .split(" ")
          .slice(0, 40)
          .join(" ") + "...";

      }

      let title = file.name
        .replace(".html","")
        .replace(/-/g," ");

      postsDiv.innerHTML += `

        <div class="latest-post-card">

          <h2>
            <a href="/blogs/${file.name}">
              ${title}
            </a>
          </h2>

          <p>${excerpt}</p>

          <a class="read-more-btn" href="/blogs/${file.name}">
            Read More
          </a>

        </div>

      `;

    }

  }

}

loadPosts();

</script>
